spring.application.name=journalApp

#spring.application.name=StudentManagmentSystem
spring.datasource.url=jdbc:mysql://localhost:3306/journal
spring.datasource.username=root
spring.datasource.password=root

##Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#
#Hibernate auto ddl
# create - refresh all data on every time we start the project
# update - save data for whenever you do not delete using operation and manually query write
spring.jpa.hibernate.ddl-auto=create
#
logging.level.org.hibernate.SQL=DEBUG

